<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solara Sun — Twitch Extension</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0d0403;color:#ddd;font-family:'Courier New',monospace;padding:10px;font-size:11px;}
    .header{display:flex;align-items:center;gap:6px;margin-bottom:8px;border-bottom:1px solid #3a1008;padding-bottom:6px;}
    .header h1{color:#c8a84e;font-size:11px;letter-spacing:1px;font-weight:700;}
    .sun-section{text-align:center;margin-bottom:8px;}
    .sun-big{font-size:28px;margin-bottom:2px;}
    .pct{font-size:18px;font-weight:700;margin-bottom:2px;}
    .phase{font-size:9px;letter-spacing:1px;font-weight:700;margin-bottom:6px;}
    .bar{background:#120604;border-radius:3px;height:6px;margin-bottom:4px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:3px;transition:width 1s;}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;}
    .stat{background:#1a0806;border:1px solid #3a1008;border-radius:4px;padding:5px;text-align:center;}
    .stat-val{font-size:13px;font-weight:700;color:#c8a84e;display:block;}
    .stat-lbl{font-size:8px;color:#555;display:block;margin-top:1px;}
    .run-section{background:#1a0806;border:1px solid #3a1008;border-radius:4px;padding:6px;margin-bottom:6px;}
    .run-label{color:#888;font-size:9px;margin-bottom:2px;}
    .run-wave{color:#da0;font-size:15px;font-weight:700;}
    .deaths-to{font-size:9px;color:#555;line-height:1.4;margin-bottom:6px;}
    .cta{display:block;text-align:center;background:#2a1040;border:1px solid #5a3080;color:#b090e0;font-size:9px;padding:5px;border-radius:4px;text-decoration:none;margin-top:4px;}
    .cta:hover{background:#3a1860;color:#c8a0ff;}
    .updated{font-size:8px;color:#333;text-align:center;margin-top:4px;}
    .offline{color:#444;text-align:center;padding:12px;font-size:10px;}
  </style>
</head>
<body>
<div class="header">
  <span style="font-size:14px">☀</span>
  <h1>SOLARA: SUNFALL</h1>
</div>

<div class="sun-section">
  <div class="sun-big" id="sun-icon">☀</div>
  <div class="pct" id="pct" style="color:#c8a84e">—%</div>
  <div class="phase" id="phase" style="color:#c8a84e">Loading…</div>
  <div class="bar"><div class="bar-fill" id="bar-fill" style="width:100%;background:#c8a84e"></div></div>
</div>

<div class="stats">
  <div class="stat">
    <span class="stat-val" id="stat-deaths">—</span>
    <span class="stat-lbl">Deaths This Season</span>
  </div>
  <div class="stat">
    <span class="stat-val" id="stat-season">1</span>
    <span class="stat-lbl">Season</span>
  </div>
</div>

<div class="run-section">
  <div class="run-label">Streamer's Current Run</div>
  <div class="run-wave" id="streamer-wave">Not in run</div>
</div>

<div class="deaths-to" id="deaths-to"></div>

<a class="cta" href="https://vaultsparkstudios.github.io/solara/" target="_blank" rel="noopener">
  ☀ Play Solara: Sunfall Free
</a>
<a class="cta" href="https://vaultsparkstudios.github.io/solara/archive.html" target="_blank" rel="noopener" style="color:#7a5090;border-color:#3a1050">
  ✝ Archive of the Fallen
</a>
<div class="updated" id="updated"></div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script>
const SB_URL = ''; // Injected at build time or via Twitch config
const SB_KEY = ''; // Injected at build time or via Twitch config

const PHASES = [
  { min: 80, label: 'FULL DAWN', color: '#f0c040', icon: '☀' },
  { min: 60, label: 'AMBER WARNING', color: '#e08020', icon: '🌤' },
  { min: 40, label: 'THE TWILIGHT', color: '#c06020', icon: '🌅' },
  { min: 20, label: 'THE DIMMING', color: '#a03010', icon: '🌑' },
  { min: 0,  label: 'THE ECLIPSE',  color: '#802010', icon: '⚫' },
];

function getPhase(b) { return PHASES.find(p => b > p.min) || PHASES[PHASES.length - 1]; }

async function refresh() {
  if (!SB_URL) {
    document.getElementById('phase').textContent = 'Configure Supabase';
    return;
  }
  try {
    const r = await fetch(`${SB_URL}/rest/v1/sun_state?select=brightness,total_deaths,season&limit=1`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const data = await r.json();
    const row = data?.[0];
    if (!row) return;
    const b = Math.max(0, Math.min(100, Number(row.brightness) || 100));
    const phase = getPhase(b);
    const deaths = Number(row.total_deaths || 0);
    const deathWeight = 0.0008;
    const deathsLeft = Math.max(0, Math.round(b / deathWeight));

    document.getElementById('sun-icon').textContent = phase.icon;
    document.getElementById('pct').textContent = Math.round(b) + '%';
    document.getElementById('pct').style.color = phase.color;
    document.getElementById('phase').textContent = phase.label;
    document.getElementById('phase').style.color = phase.color;
    document.getElementById('bar-fill').style.width = b + '%';
    document.getElementById('bar-fill').style.background = phase.color;
    document.getElementById('stat-deaths').textContent = deaths >= 1000 ? (deaths / 1000).toFixed(1) + 'k' : deaths;
    document.getElementById('stat-season').textContent = row.season || 1;
    document.getElementById('deaths-to').textContent = deathsLeft > 0
      ? `~${deathsLeft.toLocaleString()} more deaths until Sunfall Event`
      : '⚠️ Grand Sunfall Event is imminent!';
    document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {}
}

// Twitch extension: receive streamer's wave from broadcaster config or PubSub
if (typeof Twitch !== 'undefined') {
  Twitch.ext.onContext((ctx) => {});
  Twitch.ext.listen('broadcast', (target, contentType, message) => {
    try {
      const msg = JSON.parse(message);
      if (msg.type === 'wave_update') {
        document.getElementById('streamer-wave').textContent = msg.wave ? `Wave ${msg.wave}/30` : 'Not in run';
      }
    } catch(e) {}
  });
}

refresh();
setInterval(refresh, 300000);
</script>
</body>
</html>
